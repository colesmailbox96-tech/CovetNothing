<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="format-detection" content="telephone=no" />
  <title>Covet Nothing</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%; overflow: hidden; background: #000;
      touch-action: none; -webkit-touch-callout: none;
      -webkit-user-select: none; user-select: none;
      overscroll-behavior: none; -webkit-overflow-scrolling: auto;
      -webkit-tap-highlight-color: transparent;
      position: fixed; top: 0; left: 0;
    }
    #game-container {
      width: 100%; height: 100%; touch-action: none;
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      -webkit-tap-highlight-color: transparent;
    }
    canvas {
      display: block; image-rendering: pixelated; touch-action: none;
      -webkit-tap-highlight-color: transparent;
    }
  </style>
</head>
<body>
  <div id="game-container"></div>
  <script type="module" src="/src/main.js"></script>
  <script>
    // Prevent iOS rubber-band scrolling, double-tap zoom, and context menu on the game canvas
    var gc = document.getElementById('game-container');
    gc.addEventListener('touchmove', function(e) { e.preventDefault(); }, { passive: false });
    document.addEventListener('gesturestart', function(e) { e.preventDefault(); }, { passive: false });
    document.addEventListener('gesturechange', function(e) { e.preventDefault(); }, { passive: false });
    document.addEventListener('gestureend', function(e) { e.preventDefault(); }, { passive: false });
    // Prevent iOS double-tap zoom
    var lastTouchEnd = 0;
    gc.addEventListener('touchend', function(e) {
      var now = Date.now();
      if (now - lastTouchEnd <= 300) { e.preventDefault(); }
      lastTouchEnd = now;
    }, { passive: false });
    // Prevent long-press context menu on iOS
    gc.addEventListener('contextmenu', function(e) { e.preventDefault(); });
    document.addEventListener('contextmenu', function(e) { e.preventDefault(); });
    // Lock orientation to landscape if supported
    if (screen.orientation && screen.orientation.lock) {
      screen.orientation.lock('landscape').catch(function() {});
    }
  </script>
</body>
</html>
